# IKEv2 gateway — native VPN clients (iOS, Android, Windows, macOS all have a
# built-in IKEv2 client; NO app install) onto the pigeon network.
#
# Architecture:
#   strongSwan (charon) terminates IKEv2 and does ESP in USERSPACE via the
#   kernel-libipsec plugin — so it needs no kernel IPsec/XFRM modules, just a
#   TUN device. Decrypted client traffic lands on that TUN. The tunbridge
#   sidecar reads the TUN and bridges each client IP onto the loft as its own
#   virtual host (per-peer), exactly like the WireGuard gateway.
#
#   phone (native IKEv2) ═ESP═► charon (libipsec) ─► TUN ─► tunbridge ─► loft
#
# Auth: EAP (username/password) — the friendliest for phones. The PSK/creds
# below are lab defaults; change them. Clients use server = the published
# IKEv2 port (up.ps1 exposes 500/4500 udp on a recreate).
#
# UNVERIFIED end-to-end: this needs a real device to exercise the IKEv2
# handshake, and Talos must expose /dev/net/tun (it does by default). The
# tunbridge half is the same proven /port bridging the perch + WireGuard
# paths use. See docs/edge.md for the testing checklist.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ikev2-conf
  namespace: pigeon-system
data:
  swanctl.conf: |
    connections {
      pigeon {
        version = 2
        proposals = aes256-sha256-modp2048,default
        pools = pigeonpool
        encap = yes
        rekey_time = 0
        local {
          auth = pubkey
          certs = server.crt
          id = pigeon.localhost
        }
        remote {
          auth = eap-mschapv2
          eap_id = %any
        }
        children {
          pigeon {
            local_ts = 0.0.0.0/0
            esp_proposals = aes256-sha256,default
            # Bind this SA to the ipsec0 XFRM interface so decrypted client
            # traffic lands there for tunbridge to pick up.
            if_id_in = 42
            if_id_out = 42
          }
        }
      }
    }
    pools {
      pigeonpool { addrs = 10.99.0.192/27 }
    }
    secrets {
      eap-demo { id = pigeon, secret = "pigeon-vpn" }
    }
  charon.conf: |
    charon {
      # This image only ships kernel-netlink (XFRM). Use it and route the
      # client pool through an XFRM interface the bridge can read.
      install_routes = yes
      install_virtual_ip = yes
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ikev2-gateway
  namespace: pigeon-system
  labels:
    app: ikev2-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ikev2-gateway
  template:
    metadata:
      labels:
        app: ikev2-gateway
    spec:
      hostNetwork: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      # strongSwan needs NET_ADMIN + /dev/net/tun for the libipsec TUN; the
      # bridge shares the host net namespace so it sees the same TUN.
      containers:
        - name: charon
          image: strongx509/strongswan:latest
          securityContext:
            privileged: true
          command: ["/bin/sh", "-ec"]
          args:
            - |
              cp /conf/swanctl.conf /etc/swanctl/swanctl.conf
              cp /conf/charon.conf /etc/strongswan.d/charon.conf
              PKI=$(command -v pki || echo /usr/sbin/pki)

              # Self-signed RSA server cert (RSA for broad client compat). The
              # client (phone/Windows) must trust this CA — install ca.crt on
              # the device, or accept on first connect.
              "$PKI" --gen --type rsa --size 2048 --outform pem > /etc/swanctl/private/server.key
              # A CA, then a server cert signed by it (clients install the CA
              # to trust the gateway; the leaf carries the serverAuth flag +
              # SAN the OS checks).
              "$PKI" --gen --type rsa --size 2048 --outform pem > /etc/swanctl/private/ca.key
              "$PKI" --self --ca --in /etc/swanctl/private/ca.key --type rsa \
                --dn "CN=Pigeon ISP CA" --outform pem > /etc/swanctl/x509ca/ca.crt
              "$PKI" --pub --in /etc/swanctl/private/server.key --type rsa | \
                "$PKI" --issue --cacert /etc/swanctl/x509ca/ca.crt --cakey /etc/swanctl/private/ca.key \
                  --dn "CN=pigeon.localhost" --san pigeon.localhost \
                  --flag serverAuth --outform pem > /etc/swanctl/x509/server.crt
              echo "=== server cert ==="; "$PKI" --print --in /etc/swanctl/x509/server.crt | head -8

              # XFRM interface ipsec0 (if_id 42) — decrypted client traffic
              # lands here; the route makes the kernel send replies back
              # through it (ESP-encrypt). tunbridge taps it.
              ip link add ipsec0 type xfrm if_id 42 2>/dev/null \
                || ip link add ipsec0 type xfrm dev lo if_id 42 2>/dev/null || true
              ip link set ipsec0 up 2>/dev/null || true
              ip route add 10.99.0.192/27 dev ipsec0 2>/dev/null || true
              echo "=== ipsec0 ==="; ip addr show ipsec0 2>/dev/null || echo "no ipsec0 (xfrm unsupported?)"

              # Locate the charon daemon (path varies: libexec vs lib).
              CHARON=$(ls /usr/libexec/ipsec/charon /usr/lib/ipsec/charon /usr/sbin/charon 2>/dev/null | head -1)
              echo "charon: $CHARON"
              "$CHARON" &
              for i in $(seq 1 30); do [ -S /var/run/charon.vici ] && break; sleep 1; done
              swanctl --load-all
              echo "=== loaded connections ==="; swanctl --list-conns
              wait
          volumeMounts:
            - name: conf
              mountPath: /conf
            - name: tun
              mountPath: /dev/net/tun
        - name: tunbridge
          image: golang:1.24-alpine
          securityContext:
            privileged: true
          env:
            - name: GOMODCACHE
              value: /gocache
          command: ["/bin/sh", "-ec"]
          args:
            - |
              mkdir -p /build /out
              tar xzf /src/loft-src.tgz -C /build
              cd /build
              CGO_ENABLED=0 go build -o /out/tunbridge ./cmd/tunbridge
              # wait for the charon container to create the ipsec0 XFRM
              # interface (sysfs check — no iproute2 in alpine), then attach.
              for i in $(seq 1 40); do [ -d /sys/class/net/ipsec0 ] && break; sleep 2; done
              exec /out/tunbridge -gateway 10.5.0.2:9777 -attach ipsec0
          volumeMounts:
            - name: src
              mountPath: /src
              readOnly: true
            - name: gocache
              mountPath: /gocache
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        - name: conf
          configMap:
            name: ikev2-conf
        - name: src
          configMap:
            name: loft-src
        - name: gocache
          emptyDir: {}
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
