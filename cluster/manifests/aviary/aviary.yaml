# The aviary: every pod in this namespace gets GAME networking — its frames
# only move if the player physically routes them. Milestone 1 inhabitants:
# alice pings bob. No probes; the kubelet has no path to these IPs (that's
# the point).
apiVersion: v1
kind: Namespace
metadata:
  name: aviary
  labels:
    pod-security.kubernetes.io/enforce: privileged # NET_RAW isn't baseline
---
apiVersion: v1
kind: Pod
metadata:
  name: alice
  namespace: aviary
  labels:
    app: pigeon-test
spec:
  terminationGracePeriodSeconds: 1
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sh", "-c", "sleep 2147483647"]
      securityContext:
        capabilities:
          add: ["NET_RAW"]
---
apiVersion: v1
kind: Pod
metadata:
  name: bob
  namespace: aviary
  labels:
    app: pigeon-test
spec:
  terminationGracePeriodSeconds: 1
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sh", "-c", "sleep 2147483647"]
      securityContext:
        capabilities:
          add: ["NET_RAW"]
