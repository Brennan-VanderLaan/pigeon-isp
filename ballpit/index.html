<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pigeon Ballpit — route the balls, route the packets</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0f15; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #d6deea; }
      #app { position: fixed; inset: 0; }
      #hud {
        position: fixed; top: 12px; left: 12px; padding: 10px 12px; border-radius: 10px;
        background: rgba(16, 22, 32, 0.78); border: 1px solid #243044; font-size: 12px; line-height: 1.5;
        pointer-events: none; max-width: 320px;
      }
      #hud h1 { margin: 0 0 4px; font-size: 14px; color: #ffd479; }
      #hud .k { color: #6fdc8c; }
      #hud .warn { color: #ffb86b; }
      #log {
        position: fixed; bottom: 12px; left: 12px; width: 380px; max-height: 26vh; overflow: hidden;
        font-size: 11px; line-height: 1.45; color: #9fb0c4; pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #log div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"><h1>Pigeon Ballpit</h1><div id="hud-body">connecting…</div></div>
    <div id="log"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
