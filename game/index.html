<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pigeon ISP — build a router, for real</title>
  <style>
    :root {
      --panel: rgba(18, 22, 30, 0.92);
      --edge: #2c3442;
      --text: #cfd8e3;
      --dim: #7b8794;
      --accent: #ffb347;
      --good: #6fdc8c;
      --bad: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e13; }
    body { font: 13px/1.45 'Cascadia Code', 'Consolas', monospace; color: var(--text); }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    .panel {
      position: fixed; background: var(--panel); border: 1px solid var(--edge);
      border-radius: 8px; padding: 10px 12px; pointer-events: auto;
    }
    #status { top: 10px; left: 10px; display: flex; gap: 14px; align-items: center; }
    #status .mode { font-weight: bold; }
    #status .mode.live { color: var(--good); }
    #status .mode.sim { color: var(--accent); }
    #status .mode.down { color: var(--bad); }

    #inspector { top: 10px; right: 10px; width: 340px; max-height: 70vh; overflow-y: auto; display: none; }
    #inspector h3 { margin: 0 0 6px; color: var(--accent); font-size: 13px; }
    #inspector table { width: 100%; border-collapse: collapse; }
    #inspector td { padding: 1px 4px; vertical-align: top; }
    #inspector td:first-child { color: var(--dim); white-space: nowrap; }
    #inspector .hex { margin-top: 8px; color: var(--dim); font-size: 11px; white-space: pre; }

    #console {
      bottom: 64px; left: 10px; width: 480px; height: 180px; overflow-y: auto;
      font-size: 12px;
    }
    #console .line { white-space: pre-wrap; }
    #console .line .who { color: var(--accent); }

    #toolbar { bottom: 10px; left: 10px; display: flex; gap: 8px; align-items: center; }
    #toolbar button {
      background: #1a2230; color: var(--text); border: 1px solid var(--edge);
      border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
    }
    #toolbar button.active { border-color: var(--accent); color: var(--accent); }
    #toolbar .hint { color: var(--dim); margin-left: 6px; }
    #toolbar input[type=range] { accent-color: var(--accent); vertical-align: middle; }

    #filtercfg h3 { margin: 0 0 8px; color: #b98aff; font-size: 13px; }
    #filtercfg label { display: block; color: var(--dim); margin: 8px 0 2px; font-size: 12px; }
    #filtercfg select, #filtercfg input[type=text], #filtercfg textarea {
      width: 100%; background: #1a2230; color: var(--text); border: 1px solid var(--edge);
      border-radius: 6px; padding: 6px 8px; font: inherit; box-sizing: border-box;
    }
    #filtercfg textarea { height: 64px; resize: vertical; font-size: 12px; }
    #filtercfg .row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    #filtercfg button {
      background: #1a2230; color: var(--text); border: 1px solid var(--edge);
      border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
    }
    #filtercfg .err { color: var(--bad); font-size: 12px; margin-top: 6px; }
    #filtercfg .hint2 { color: var(--dim); font-size: 11px; margin-top: 4px; }

    #banner {
      top: 56px; left: 50%; transform: translateX(-50%);
      color: var(--accent); display: none;
    }

    #views {
      top: 10px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; padding: 6px;
    }
    #views button {
      background: #1a2230; color: var(--text); border: 1px solid var(--edge);
      border-radius: 6px; padding: 6px 14px; font: inherit; cursor: pointer;
    }
    #views button.active { border-color: var(--accent); color: var(--accent); }

    .fullpanel {
      position: fixed; inset: 64px 16px 16px 16px; background: var(--panel);
      border: 1px solid var(--edge); border-radius: 10px; padding: 18px;
      overflow-y: auto; display: none; z-index: 5;
    }
    .fullpanel h2 { margin: 0 0 4px; color: var(--accent); }
    .fullpanel .sub { color: var(--dim); margin-bottom: 14px; }
    .fullpanel button {
      background: #1a2230; color: var(--text); border: 1px solid var(--edge);
      border-radius: 6px; padding: 8px 16px; font: inherit; cursor: pointer;
    }
    .fullpanel button:disabled { opacity: 0.4; cursor: wait; }
    .fullpanel select, .fullpanel input {
      background: #1a2230; color: var(--text); border: 1px solid var(--edge);
      border-radius: 6px; padding: 7px 10px; font: inherit;
    }
    .cards { display: flex; gap: 14px; flex-wrap: wrap; margin: 14px 0; }
    .card {
      background: #131a26; border: 1px solid var(--edge); border-radius: 10px;
      padding: 14px 18px; min-width: 240px; flex: 1;
    }
    .card h3 { margin: 0 0 8px; font-size: 13px; color: var(--dim); font-weight: normal; }
    .card .big { font-size: 34px; font-weight: bold; }
    .card .big.baseline { color: #8ab4ff; }
    .card .big.pigeon { color: var(--accent); }
    .card .small { color: var(--dim); font-size: 12px; margin-top: 6px; white-space: pre-line; }
    .bar { height: 10px; background: #0c1118; border-radius: 5px; margin-top: 10px; overflow: hidden; }
    .bar > div { height: 100%; border-radius: 5px; }
    table.grid { width: 100%; border-collapse: collapse; margin-top: 10px; }
    table.grid th { text-align: left; color: var(--dim); font-weight: normal; padding: 4px 8px; border-bottom: 1px solid var(--edge); }
    table.grid td { padding: 4px 8px; border-bottom: 1px solid #1a2230; }
    .ok { color: var(--good); }
    .bad { color: var(--bad); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="views" class="panel">
    <button data-view="factory" class="active">Factory</button>
    <button data-view="speedtest">Speedtest</button>
    <button data-view="health">Health</button>
  </div>
  <div id="speedtest" class="fullpanel"></div>
  <div id="health" class="fullpanel"></div>
  <div id="status" class="panel">
    <span class="mode" id="mode">connecting…</span>
    <span id="stat-ports">ports: 0</span>
    <span id="stat-rate">in: 0 pps</span>
    <span id="stat-pigeons">pigeons: 0</span>
    <span id="stat-drops">drops: 0</span>
    <span id="stat-decide" style="display:none">decide: —</span>
    <span id="stat-fps">fps: —</span>
  </div>
  <div id="banner" class="panel"></div>
  <div id="inspector" class="panel"></div>
  <div id="console" class="panel"></div>
  <div id="toolbar" class="panel">
    <button id="tool-select" data-tool="select">1 select</button>
    <button id="tool-belt" data-tool="belt">2 belt</button>
    <button id="tool-filter" data-tool="filter">3 filter</button>
    <button id="tool-erase" data-tool="erase">4 erase</button>
    <span class="hint">R rotate · E eject side · drag paints · select-click a filter to program it</span>
    <span style="margin-left:10px;color:var(--dim)">speed</span>
    <input id="speed" type="range" min="-2" max="5.65" step="0.05" value="0" style="width:110px">
    <span id="speed-label" style="min-width:46px">1.0×</span>
    <button id="clear-floor" title="bulldoze all belts and filters">🧹</button>
  </div>
  <div id="filtercfg" class="panel" style="display:none; bottom: 64px; right: 10px; width: 320px;"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
